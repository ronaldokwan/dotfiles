name: lint

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check (bash -n)
        run: bash -n setup.sh

      - name: ShellCheck
        run: shellcheck setup.sh   # shellcheck is preinstalled on ubuntu-latest runners
